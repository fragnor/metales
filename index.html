<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Metales</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
  
  <style>
    /* --- ESTILOS VISUALES --- */
    :root {
      --primary: #2c3e50;
      --secondary: #34495e;
      --accent: #d35400;
      --light: #ecf0f1;
      --white: #ffffff;
      --border: #bdc3c7;
    }

    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light); margin: 0; }
    
    /* Login */
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-card { background: var(--white); padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }

    /* Estructura Principal */
    header { background: var(--primary); color: var(--white); padding: 15px; text-align: center; }
    
    /* Controles Globales (Fecha y Turno) */
    .global-controls { background: var(--white); padding: 15px; display: flex; gap: 15px; justify-content: center; border-bottom: 2px solid var(--border); }
    .global-controls div { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--primary); }
    .global-controls input, .global-controls select { margin: 0; padding: 8px; width: auto; }

    /* Navegación Máquinas */
    nav.tabs { display: flex; background: var(--secondary); overflow-x: auto; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--border); cursor: pointer; font-weight: 600; transition: 0.3s; }
    .tab-btn.active { color: var(--white); border-bottom: 4px solid var(--accent); background: rgba(255,255,255,0.1); }

    /* Contenedor y Sub-pestañas */
    .container { padding: 20px; max-width: 700px; margin: auto; }
    .sub-tabs { display: flex; margin-bottom: 20px; gap: 10px; }
    .sub-tab-btn { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--light); cursor: pointer; font-weight: bold; border-radius: 5px; color: var(--primary); }
    .sub-tab-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

    .card { background: var(--white); padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    /* Formularios */
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; color: var(--secondary); margin-bottom: 5px; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid var(--border); box-sizing: border-box; font-size: 15px; }
    input[readonly] { background-color: #f9f9f9; color: #7f8c8d; cursor: not-allowed; }
    
    button.btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
    button.btn-submit:disabled { background: #95a5a6; }

    .hidden { display: none !important; }
    .loader { text-align: center; color: var(--accent); font-weight: bold; margin-top: 10px; }
    
    /* Grid para incidencias */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h2 style="margin-top:0; color:var(--primary);">METALES</h2>
      <div class="form-group"><input type="text" id="user" placeholder="Usuario"></div>
      <div class="form-group"><input type="password" id="pass" placeholder="Contraseña"></div>
      <button class="btn-submit" id="btn-login" onclick="ejecutarLogin()">ENTRAR</button>
      <div id="login-status" class="loader"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <header><h2 style="margin:0;">REGISTRO DE PRODUCCIÓN</h2></header>

    <div class="global-controls">
      <div>Fecha: <input type="date" id="global-fecha"></div>
      <div>Turno: 
        <select id="global-turno" onchange="generarHorasDesplegable()">
          <option value="Mañana">Mañana (06:00 - 14:00)</option>
          <option value="Tarde">Tarde (14:00 - 22:00)</option>
          <option value="Noche">Noche (22:00 - 06:00)</option>
        </select>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab-btn active" onclick="cambiarMaquina(event, 'Finder')">FINDER</button>
      <button class="tab-btn" onclick="cambiarMaquina(event, 'Zurik')">ZURIK</button>
      <button class="tab-btn" onclick="cambiarMaquina(event, 'Medios densos')">M. DENSOS</button>
      <button class="tab-btn" onclick="cambiarMaquina(event, 'Steinert')">STEINERT</button>
    </nav>

    <div class="container">
      <h3 id="titulo-maquina" style="color: var(--primary); text-align: center; text-transform: uppercase;">MÁQUINA: FINDER</h3>

      <div class="sub-tabs">
        <button id="tab-horas" class="sub-tab-btn active" onclick="cambiarSeccion('horas')">1. HORAS DE TRABAJO</button>
        <button id="tab-incidencias" class="sub-tab-btn" onclick="cambiarSeccion('incidencias')">2. INCIDENCIAS</button>
      </div>

      <div id="seccion-horas" class="card">
        <div id="alerta-medios-densos" class="hidden" style="color: red; text-align: center; font-weight: bold; padding: 20px;">
          Producción pendiente de definir para Medios Densos. Ve a la pestaña de incidencias.
        </div>
        <div id="form-horas">
          <div class="grid-2">
            <div class="form-group">
              <label>Horas de máquina iniciales (Autocompletado)</label>
              <input type="number" id="h-iniciales" readonly placeholder="Cargando...">
            </div>
            <div class="form-group">
              <label>Horas de máquina finales</label>
              <input type="number" id="h-finales" placeholder="Introduce horas finales">
            </div>
          </div>
          <button class="btn-submit" id="btn-guardar-horas" onclick="guardarHoras()">GUARDAR HORAS</button>
          <div id="status-horas" class="loader"></div>
        </div>
      </div>

      <div id="seccion-incidencias" class="card hidden">
        <div class="grid-2">
          <div class="form-group">
            <label>Lote</label>
            <input type="text" id="inc-lote" placeholder="Dato alfanumérico">
          </div>
          <div class="form-group">
            <label>Máquina Afectada</label>
            <select id="inc-maquina"></select>
          </div>
        </div>
        
        <div class="grid-2">
          <div class="form-group">
            <label>Hora Parada</label>
            <select id="inc-h-parada"></select>
          </div>
          <div class="form-group">
            <label>Hora Arranque</label>
            <select id="inc-h-arranque"></select>
          </div>
        </div>

        <div class="form-group">
          <label>Motivo Parada</label>
          <select id="inc-motivo"></select>
        </div>

        <div class="form-group">
          <label>Observaciones</label>
          <input type="text" id="inc-obs" placeholder="Detalles de la incidencia...">
        </div>

        <button class="btn-submit" id="btn-guardar-incidencia" onclick="guardarIncidencia()">GUARDAR INCIDENCIA</button>
        <div id="status-incidencias" class="loader"></div>
      </div>

    </div>
  </div>

  <script>
    /* --- LÓGICA DE LA APLICACIÓN --- */
    
    // !!! IMPORTANTE: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT !!!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3tDrmfUh-A8nivLH2_yANtopv-zzdbeUlCwZcX4FAS7uH3P9BGlpSB-9ZyrKRSnC8/exec"; 

    // Variables de estado
    let USUARIO_ACTUAL = "";
    let MAQUINA_ACTUAL = "Finder";

    // 1. LOGIN
    function ejecutarLogin() {
      const u = document.getElementById("user").value;
      const p = document.getElementById("pass").value;
      const status = document.getElementById("login-status");

      if (!u || !p) return alert("Escribe usuario y contraseña");

      status.innerText = "Conectando con Excel...";
      document.getElementById("btn-login").disabled = true;

      const datos = new URLSearchParams();
      datos.append('accion', 'login');
      datos.append('user', u);
      datos.append('pass', p);

      fetch(SCRIPT_URL, { method: 'POST', body: datos })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          USUARIO_ACTUAL = res.user;
          document.getElementById("login-screen").classList.add("hidden");
          document.getElementById("app").classList.remove("hidden");
          document.getElementById("global-fecha").valueAsDate = new Date();
          
          // Poblar los desplegables de configuración
          poblarDesplegable("inc-motivo", res.motivos);
          poblarDesplegable("inc-maquina", res.maquinas);
          
          // Iniciar lógica de la primera pestaña
          generarHorasDesplegable();
          cargarHorasIniciales();
        } else {
          alert("Acceso denegado. Revisa tus datos.");
          document.getElementById("btn-login").disabled = false;
        }
      })
      .catch(err => {
        alert("Error de conexión");
        document.getElementById("btn-login").disabled = false;
      })
      .finally(() => status.innerText = "");
    }

    // Funciones auxiliares para desplegables
    function poblarDesplegable(idElemento, arrayDatos) {
      const select = document.getElementById(idElemento);
      select.innerHTML = "";
      arrayDatos.forEach(dato => {
        select.innerHTML += `<option value="${dato}">${dato}</option>`;
      });
    }

    // Generador de horas en saltos de 10 min
    function generarHorasDesplegable() {
      const turno = document.getElementById("global-turno").value;
      let horas = [];

      if (turno === "Mañana") horas = calcularRangoHoras(6, 14);
      else if (turno === "Tarde") horas = calcularRangoHoras(14, 22);
      else if (turno === "Noche") {
        // La noche cruza medianoche, calculamos 2 rangos
        horas = calcularRangoHoras(22, 23, true).concat(calcularRangoHoras(0, 6));
      }

      let opcionesHTML = "";
      horas.forEach(h => opcionesHTML += `<option value="${h}">${h}</option>`);
      
      document.getElementById("inc-h-parada").innerHTML = opcionesHTML;
      document.getElementById("inc-h-arranque").innerHTML = opcionesHTML;
    }

    function calcularRangoHoras(inicio, fin, esFinDeDia = false) {
      let result = [];
      let limiteH = esFinDeDia ? 24 : fin;
      
      for (let h = inicio; h < limiteH; h++) {
        for (let m = 0; m < 60; m += 10) {
          let hh = h.toString().padStart(2, '0');
          let mm = m.toString().padStart(2, '0');
          result.push(`${hh}:${mm}`);
        }
      }
      if (!esFinDeDia) result.push(`${fin.toString().padStart(2, '0')}:00`);
      return result;
    }

    // 2. NAVEGACIÓN
    function cambiarMaquina(evt, nombre) {
      MAQUINA_ACTUAL = nombre;
      document.getElementById("titulo-maquina").innerText = "MÁQUINA: " + nombre;
      
      // Estilos de botones
      const botones = document.getElementsByClassName("tab-btn");
      for (let b of botones) b.classList.remove("active");
      evt.currentTarget.classList.add("active");

      // Lógica especial para Medios Densos
      if (nombre === "Medios densos") {
        document.getElementById("form-horas").classList.add("hidden");
        document.getElementById("alerta-medios-densos").classList.remove("hidden");
        cambiarSeccion('incidencias'); // Fuerza ir a incidencias
        document.getElementById("tab-horas").disabled = true;
      } else {
        document.getElementById("form-horas").classList.remove("hidden");
        document.getElementById("alerta-medios-densos").classList.add("hidden");
        document.getElementById("tab-horas").disabled = false;
        cambiarSeccion('horas');
        cargarHorasIniciales();
      }
    }

    function cambiarSeccion(seccion) {
      if (seccion === 'horas' && MAQUINA_ACTUAL === "Medios densos") return; // Bloqueo de seguridad

      document.getElementById("tab-horas").classList.remove("active");
      document.getElementById("tab-incidencias").classList.remove("active");
      document.getElementById("seccion-horas").classList.add("hidden");
      document.getElementById("seccion-incidencias").classList.add("hidden");

      document.getElementById("tab-" + seccion).classList.add("active");
      document.getElementById("seccion-" + seccion).classList.remove("hidden");
    }

    // 3. RECUPERAR HORAS INICIALES DEL EXCEL
    function cargarHorasIniciales() {
      const inputIni = document.getElementById("h-iniciales");
      inputIni.value = "";
      inputIni.placeholder = "Buscando en Excel...";
      
      const datos = new URLSearchParams();
      datos.append('accion', 'getHoras');
      datos.append('maquina', MAQUINA_ACTUAL);

      fetch(SCRIPT_URL, { method: 'POST', body: datos })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          inputIni.value = res.horas;
        } else {
          inputIni.placeholder = "Error al cargar";
        }
      });
    }

    // 4. GUARDAR HORAS DE TRABAJO
    function guardarHoras() {
      const f = document.getElementById("global-fecha").value;
      const t = document.getElementById("global-turno").value;
      const hIni = document.getElementById("h-iniciales").value;
      const hFin = document.getElementById("h-finales").value;
      
      if (!f || !hFin) return alert("Falta fecha u horas finales");

      const status = document.getElementById("status-horas");
      const btn = document.getElementById("btn-guardar-horas");
      status.innerText = "Guardando..."; btn.disabled = true;

      const datos = new URLSearchParams();
      datos.append('accion', 'guardarHoras');
      datos.append('maquina', MAQUINA_ACTUAL);
      datos.append('fecha', f);
      datos.append('turno', t);
      datos.append('usuario', USUARIO_ACTUAL);
      datos.append('horasIni', hIni);
      datos.append('horasFin', hFin);

      fetch(SCRIPT_URL, { method: 'POST', body: datos })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          alert(res.mensaje);
          document.getElementById("h-finales").value = ""; // Limpiar tras guardar
          cargarHorasIniciales(); // Recargar el nuevo valor inicial
        } else alert("Error: " + res.error);
      })
      .finally(() => { status.innerText = ""; btn.disabled = false; });
    }

    // 5. GUARDAR INCIDENCIAS
    function guardarIncidencia() {
      const f = document.getElementById("global-fecha").value;
      const t = document.getElementById("global-turno").value;
      
      const lote = document.getElementById("inc-lote").value;
      const hParada = document.getElementById("inc-h-parada").value;
      const hArranque = document.getElementById("inc-h-arranque").value;
      const motivo = document.getElementById("inc-motivo").value;
      const maqAfectada = document.getElementById("inc-maquina").value;
      const obs = document.getElementById("inc-obs").value;

      if (!f || !lote || !motivo) return alert("Faltan datos obligatorios (Fecha, Lote o Motivo)");

      const status = document.getElementById("status-incidencias");
      const btn = document.getElementById("btn-guardar-incidencia");
      status.innerText = "Guardando..."; btn.disabled = true;

      const datos = new URLSearchParams();
      datos.append('accion', 'guardarIncidencia');
      datos.append('maquina', MAQUINA_ACTUAL); // Esto define en qué pestaña del Excel cae (ej: "incidencias Finder")
      datos.append('fecha', f);
      datos.append('turno', t);
      datos.append('usuario', USUARIO_ACTUAL);
      datos.append('lote', lote);
      datos.append('horaParada', hParada);
      datos.append('horaArranque', hArranque);
      datos.append('motivo', motivo);
      datos.append('maquinaAfectada', maqAfectada);
      datos.append('observaciones', obs);

      fetch(SCRIPT_URL, { method: 'POST', body: datos })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          alert(res.mensaje);
          // Limpiar formulario de incidencias
          document.getElementById("inc-lote").value = "";
          document.getElementById("inc-obs").value = "";
        } else alert("Error: " + res.error);
      })
      .finally(() => { status.innerText = ""; btn.disabled = false; });
    }
  </script>
</body>
</html>
